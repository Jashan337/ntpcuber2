<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Professional Rubik's Cube Coaching</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src='navbar.js' defer></script>
    <script src='footer.js' defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Sarabun', 'sans-serif'],
                    },
                },
            },
        }

        const cnt = {
            en: {
                nav: ['Home', 'Courses (Coming Soon)', 'Coaching', 'Resources', 'Contact'],
                whyMeTitle: "Why me?",
                whyMeBenefits: [
                    { title: "Multi-Event Specialist", desc: "Expertise across various WCA events." },
                    { title: "Identify & Strengthen", desc: "Personalized analysis of your weaknesses." },
                    { title: "Standardize Foundation", desc: "Refining fundamental techniques." },
                    { title: "Taylor-made Advice", desc: "Custom drills for your turning style." }
                ]
            },
            th: {
                nav: ['หน้าแรก', 'คอร์สเรียน', 'เรียนตัวต่อตัว', 'แหล่งเรียนรู้', 'ติดต่อ'],
                whyMeTitle: "ทำไมต้องเรียนกับผม?",
                whyMeBenefits: [
                    { title: "เชี่ยวชาญหลายประเภท", desc: "มีประสบการณ์แข่ง WCA หลากหลายประเภท" },
                    { title: "วิเคราะห์จุดอ่อน", desc: "วิเคราะห์และแก้ไขจุดอ่อนรายบุคคล" },
                    { title: "ปรับพื้นฐานให้แน่น", desc: "เสริมสร้างเทคนิคพื้นฐานเพื่อความเร็วที่ยั่งยืน" },
                    { title: "คำแนะนำเฉพาะตัว", desc: "แบบฝึกหัดที่ออกแบบมาเพื่อสไตล์การหมุนของคุณ" }
                ]
            }
        };
        
        const translations = {
            en: {
                title: "Elite Speedcubing Coaching",
                subtitle: "Master advanced methods like EO to ZB, X-cross, and Domino Reduction.",
                pricingTitle: "Coaching Options",
                bookTitle: "Reserve Your Session",
                formName: "Full Name",
                formEmail: "Email Address",
                formService: "Select Service",
                formButton: "Confirm Booking",
                paymentInstruction: "Scan QR to Pay",
                receiptLabel: "Upload Payment Receipt (Required)",
                confirmCheckbox: "I have completed the payment and uploaded the receipt.",
                sending: "Sending...",
                success: "Success! Check your email soon.",
                services: [
                    { name: "Written Critique (Video Analysis)", price: "฿120", desc: ["Detailed breakdown of 5 recorded solves.", "Identify strengths and inefficiencies", "Lookahead analysis"]},
                    { name: "Video Critique (Video Analysis)", price: "฿200", desc: ["Full video breakdown of 5 solves.", "Ergonomics suggestions", "Improvement tips"]},
                    { name: "Live 1-on-1 Session (30-Min)", price: "฿250", desc: ["Interactive coaching via video call."]},
                    { name: "Live 1-on-1 Session (1 Hour)", price: "฿400", desc: ["Comprehensive 1-on-1 coaching."]},
                    { name: "Mastery Pack (4 Sessions)", price: "฿1,440", desc: ["Custom drills and long-term progression."]}
                ]
            },
            th: {
                title: "สอนรูบิกส์ระดับมืออาชีพ",
                subtitle: "ฝึกฝนเทคนิคขั้นสูง เช่น EO to ZB, X-cross และ Domino Reduction",
                pricingTitle: "แพ็กเกจการสอน",
                bookTitle: "จองเวลาเรียนของคุณ",
                formName: "ชื่อ-นามสกุล",
                formEmail: "อีเมล",
                formService: "เลือกบริการ",
                formButton: "ยืนยันการจอง",
                paymentInstruction: "สแกน QR เพื่อชำระเงิน",
                receiptLabel: "แนบหลักฐานการโอนเงิน (จำเป็น)",
                confirmCheckbox: "ฉันได้ชำระเงินและแนบหลักฐานเรียบร้อยแล้ว",
                sending: "กำลังส่ง...",
                success: "สำเร็จ! โปรดรอการติดต่อกลับทางอีเมล",
                services: [
                    { name: "ตรวจการแก้แบบเขียน (Video Analysis)", price: "฿120", desc: ["วิเคราะห์การแก้ 5 รอบแบบละเอียด"] },
                    { name: "ตรวจการแก้แบบวิดีโอ (Video Analysis)", price: "฿200", desc: ["วิดีโอวิเคราะห์พร้อมคำแนะนำการหมุน"] },
                    { name: "สอนสดตัวต่อตัว (30 นาที)", price: "฿250", desc: ["เรียนสดผ่านวิดีโอคอล"] },
                    { name: "สอนสดตัวต่อตัว (1 ชั่วโมง)", price: "฿400", desc: ["เรียนสดเน้นเนื้อหาเจาะลึก"] },
                    { name: "แพ็กเกจเชี่ยวชาญ (4 ครั้ง)", price: "฿1,440", desc: ["พัฒนาต่อเนื่องพร้อมตารางฝึกส่วนตัว"] }
                ]
            }
        };

        let currentLang = 'en';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwqbpCMgiHXTgaCYfqt2z3WWfIdE6AEpUcf5pvsYHh5ZMF7a5lzWJYP8W0NFjsT4B0/exec';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'th' : 'en';
            render();
            document.getElementById('service-select').dispatchEvent(new Event('change'));
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const content = translations[currentLang];
            
            const serviceValue = document.getElementById('service-select').value.toLowerCase();
            const selectedDays = Array.from(document.querySelectorAll('#available-date input:checked')).map(el => el.value);
            const receiptFile = document.getElementById('receipt-upload').files[0];

            if (!serviceValue.includes('critique') && selectedDays.length === 0) {
                alert(currentLang === 'en' ? 'Please select at least one available day.' : 'กรุณาเลือกวันที่สะดวกอย่างน้อย 1 วัน');
                return;
            }
            
            btn.disabled = true;
            btn.innerText = content.sending;

            try {
                let base64Receipt = "";
                if (receiptFile) base64Receipt = await toBase64(receiptFile);

                const data = {
                    name: document.getElementById('input-name').value,
                    email: document.getElementById('input-email').value,
                    service: document.getElementById('service-select').value,
                    availableDate: selectedDays,
                    preferredTime: document.getElementById('preferred-time').value,
                    secondaryTime: document.getElementById('secondary-time').value,
                    videoLink: document.getElementById('video-link').value,
                    wcaEvent: document.getElementById('wca-event').value,
                    receiptData: base64Receipt,
                    receiptName: receiptFile ? receiptFile.name : "receipt.png"
                };

                if (serviceValue.includes('critique')) {
                    data.availableDate = ""; data.preferredTime = ""; data.secondaryTime = ""; data.wcaEvent = "";
                } else {
                    data.videoLink = "";
                }

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    //cache: 'no-cache',
                    //headers: { 'Content-Type': 'application/json' },
                    headers: {'Content-Type': 'text/plain;charset=utf-8'},
                    body: JSON.stringify(data)
                });
                
                alert(content.success);
                event.target.reset();
                toggleSubmitButton();
                document.getElementById('service-select').dispatchEvent(new Event('change'));
            } catch (error) {
                console.error('Error:', error);
                alert('Error connecting to server.');
            } finally {
                btn.innerText = content.formButton;
            }
        }

        function toggleSubmitButton() {
            const checkbox = document.getElementById('confirm-payment');
            const btn = document.getElementById('submit-btn');
            btn.disabled = !checkbox.checked;
            btn.classList.toggle('opacity-50', !checkbox.checked);
            btn.classList.toggle('cursor-not-allowed', !checkbox.checked);
        }

        function render() {
            const c = cnt[currentLang];
            const trans = translations[currentLang];

            // Nav & Hero
            document.querySelectorAll('[data-nav]').forEach((el, i) => el.textContent = c.nav[i]);
            document.getElementById('main-title').innerText = trans.title;
            document.getElementById('main-subtitle').innerText = trans.subtitle;

            // Why Me Section
            document.getElementById('why-me-title').innerHTML = `${c.whyMeTitle} <span class="text-blue-500">?</span>`;
            const benefitsList = document.getElementById('benefits-list');
            benefitsList.innerHTML = c.whyMeBenefits.map((b, i) => `
                <div class="flex gap-6">
                    <div class="flex-shrink-0 w-12 h-12 bg-blue-600/10 border border-blue-500/20 rounded-xl flex items-center justify-center text-blue-500 text-xl">
                        ${['🧩', '🔍', '🏗️', '🎯'][i]}
                    </div>
                    <div>
                        <h3 class="text-xl font-bold mb-2">${b.title}</h3>
                        <p class="text-neutral-400">${b.desc}</p>
                    </div>
                </div>
            `).join('');

            // Pricing & Booking
            document.getElementById('pricing-title').innerText = trans.pricingTitle;
            document.getElementById('booking-title').innerText = trans.bookTitle;
            document.getElementById('payment-text').innerText = trans.paymentInstruction;
            document.getElementById('receipt-upload-label').innerText = trans.receiptLabel;
            document.getElementById('confirm-label').innerText = trans.confirmCheckbox;
            document.getElementById('submit-btn').innerText = trans.formButton;

            const grid = document.getElementById('pricing-grid');
            grid.innerHTML = trans.services.map((s, index) => {
                const isPopular = index === 1;
                return `
                <div class="relative bg-neutral-900 border ${isPopular ? 'border-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.2)]' : 'border-neutral-800'} p-8 rounded-2xl hover:border-blue-500 transition duration-300 flex flex-col justify-between h-full">
                    ${isPopular ? `<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest py-1 px-3 rounded-full shadow-lg">Most Popular</div>` : ''}
                    <div class="flex flex-col h-full">
                        <div>
                            <h3 class="text-xl font-bold text-white mb-4 min-h-[64px]">${s.name}</h3>
                            <ul class="text-neutral-400 text-sm mb-6 space-y-2">
                                ${s.desc.map(f => `<li class="flex items-start gap-2"><span class="text-blue-500 font-bold mt-[2px]">✔</span><span>${f}</span></li>`).join('')}
                            </ul>
                        </div>
                        <div class="text-3xl font-bold text-blue-500 mt-auto">${s.price}</div>
                    </div>
                </div>`;
            }).join('');

            const select = document.getElementById('service-select');
            const prev = select.value;
            select.innerHTML = `<option value="" disabled selected>${trans.formService}</option>` + 
                trans.services.map(s => `<option value="${s.name}">${s.name} - ${s.price}</option>`).join('');
            if(prev) select.value = prev;

            document.getElementById('input-name').placeholder = trans.formName;
            document.getElementById('input-email').placeholder = trans.formEmail;
            
            const navbar = document.querySelector('my-navbar');
            if (navbar?.updateLanguageDisplay) navbar.updateLanguageDisplay();
        }

        function setupServiceLogic() {
            const serviceSelect = document.getElementById('service-select');
            const groups = {
                video: document.getElementById('video-group'),
                availability: document.getElementById('availability-group'),
                time: document.getElementById('time-group'),
                wca: document.getElementById('wca-group'),
                pay: document.getElementById('payment-group')
            };

            serviceSelect.addEventListener('change', () => {
                const selected = serviceSelect.value.toLowerCase();
                Object.values(groups).forEach(g => {
                    g.classList.add('hidden');
                    g.querySelectorAll('input, select').forEach(i => i.required = false);
                });

                if (!selected) return;

                groups.pay.classList.remove('hidden');
                groups.pay.querySelector('input[type="file"]').required = true;

                if (selected.includes('critique')) {
                    groups.video.classList.remove('hidden');
                    groups.video.querySelector('input').required = true;
                } else {
                    groups.availability.classList.remove('hidden');
                    groups.time.classList.remove('hidden');
                    groups.wca.classList.remove('hidden');
                    groups.wca.querySelector('select').required = true;
                    groups.time.querySelectorAll('select').forEach(s => s.required = true);
                }
            });
        }

        function generateTimeOptions(id) {
            const s = document.getElementById(id);
            s.innerHTML = '<option value="">Select time</option>';
            for (let h = 0; h <= 23; h++) {
                for (let m of ['00', '30']) {
                    let v = `${String(h).padStart(2, '0')}:${m}`;
                    s.add(new Option(v, v));
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
            generateTimeOptions('preferred-time');
            generateTimeOptions('secondary-time');
            setupServiceLogic();
            toggleSubmitButton();
        });
    </script>
</head>
<body class="bg-black text-white selection:bg-blue-500/30">

    <my-navbar></my-navbar>
    
    <section class="relative pt-32 pb-24 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <div class="max-w-4xl mx-auto">
            <h1 id="main-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8"></h1>
            <p id="main-subtitle" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed"></p>
        </div>
    </section>

    <section id="why-me" class="py-24 px-6 bg-neutral-900/30">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div class="relative">
                    <div class="absolute -inset-4 bg-blue-600/20 blur-2xl rounded-full -z-10"></div>
                    <div class="bg-neutral-900 border border-neutral-800 p-2 rounded-3xl overflow-hidden">
                        <img src="image/coach_profile.jpg" alt="Coach" class="w-full aspect-[4/5] object-cover rounded-2xl mb-8">
                        <div class="p-6">
                            <h2 class="text-3xl font-bold text-white mb-2">Natthaphat Mahtani</h2>
                            <p class="text-blue-500 font-semibold mb-6">Thailand’s best All-rounder</p>
                            <div class="space-y-4">
                                <h4 class="text-sm uppercase tracking-widest text-neutral-500 font-bold">Achievement Highlights</h4>
                                <ul class="space-y-3">
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">🏆</span> 3x3 single peak ranking 9th global</li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">🏅</span> Finalist in Continental Championship</li>
                                    <li class="flex items-center gap-3 text-neutral-300"><span class="text-blue-500">⏱️</span> 10+ years experience</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-4xl md:text-5xl font-bold mb-8" id="why-me-title"></h2>
                    <div id="benefits-list" class="space-y-8"></div>
                    <div class="mt-12 p-6 bg-blue-600/10 border border-blue-500/30 rounded-2xl inline-block">
                        <p class="text-blue-400 font-bold">Online / Onsite Sessions Available</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="pricing" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 id="pricing-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="book" class="py-24 px-6 bg-neutral-950 border-t border-neutral-900">
        <div class="max-w-3xl mx-auto">
            <h2 id="booking-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <form onsubmit="handleSubmit(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="input-name" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" />
                    <input type="email" id="input-email" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:border-blue-500 outline-none" />
                </div>
                <select id="service-select" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                
                <div id="video-group" class="hidden">
                  <label class="block mb-2">🔗 Video Link</label>
                  <input type="url" id="video-link" placeholder="YouTube/Drive link" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl" />
                </div>

                <div id="wca-group" class="hidden">
                  <label class="block mb-2">🏆 WCA Event</label>
                  <select id="wca-event" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl">
                    <option value="">Select event</option>
                    <option>3x3</option>
                    <option>2x2</option>
                    <option>4x4</option>
                    <option>5x5</option>
                    <option>6x6</option>
                    <option>7x7</option>
                    <option>OH (One-Handed)</option>
                    <option>Blindfolded</option>
                    <option>Skewb</option>
                    <option>Pyraminx</option>
                    <option>Square-1</option>
                    <option>Clock</option>
                    <option>Megaminx</option>
                  </select>
                </div>

                <div id="availability-group" class="hidden">
                  <label class="block mb-3">📅 Available Day</label>
                  <div id="available-date" class="flex flex-wrap gap-3">
                    <label class="cursor-pointer"><input type="checkbox" value="Mon" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Mon</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Tue" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Tue</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Wed" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Wed</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Thu" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Thu</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Fri" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Fri</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Sat" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Sat</span></label>
                    <label class="cursor-pointer"><input type="checkbox" value="Sun" class="hidden peer"><span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Sun</span></label>
                  </div>
                </div>

                <div id="time-group" class="hidden space-y-6">
                <!-- Primary -->
                  <div>
                    <label class="block mb-2">⏰ Most Preferred Starting Time</label>
                    <select id="preferred-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                  </div>

                  <!-- Secondary -->
                  <div>
                    <label class="block mb-2">🕰️ Secondary Preferred Starting Time</label>
                    <select id="secondary-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                  </div>
                </div>

                <div id="payment-group" class="hidden space-y-6">
                    <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8 text-center">
                        <h3 id="payment-text" class="text-xl font-bold mb-6"></h3>
                        <img src="image/qr_payment.jpeg" alt="QR" class="w-64 h-64 mx-auto bg-white p-2 rounded-xl object-contain">
                    </div>
                    <div>
                        <label id="receipt-upload-label" class="block text-sm text-neutral-400 mb-2"></label>
                        <input type="file" id="receipt-upload" accept="image/*" class="w-full bg-neutral-900 border border-neutral-800 p-3 rounded-xl file:bg-blue-600 file:border-0 file:rounded-full file:text-white file:px-4" />
                    </div>
                    <div class="flex items-start gap-3 p-4 bg-blue-600/5 border border-blue-500/20 rounded-xl">
                        <input type="checkbox" id="confirm-payment" onchange="toggleSubmitButton()" class="mt-1 w-5 h-5 rounded border-neutral-800 bg-neutral-900" />
                        <label for="confirm-payment" id="confirm-label" class="text-sm text-neutral-300 cursor-pointer"></label>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg"></button>
            </form>
        </div>
    </section>

    <my-footer></my-footer>
</body>
</html>
