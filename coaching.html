<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Professional Rubik's Cube Coaching</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Footer Template -->
    <script src='footer.js' defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Sarabun', 'sans-serif'],
                    },
                },
            },
        }
        const cnt = {
            en: {
                nav: ['Home', 'Courses (Coming Soon)', 'Coaching', 'Resources', 'Contact'],
                heroSubtitle: 'Master the Cube with structured courses, modern resources, and personal coaching.',
                courseCards: [
                  { title: 'Beginner 3×3', price: '$19', desc: 'Learn to solve from zero with clear steps.' },
                  { title: 'Intermediate CFOP', price: '$39', desc: 'Improve efficiency and average times.' },
                  { title: 'Advanced Speedcubing', price: '$79', desc: 'Full CFOP, lookahead, and TPS training.' }
                ],
                coachingTitle: '1-on-1 Coaching',
                coachingText: 'Book a private session tailored to your goals.',
                resourcesTitle: 'Free Resources',
                resourcesText: 'Algorithms, practice plans, and solving tips.',
                contactTitle: 'Book a Coaching Session'
              },
          th: {
                nav: ['หน้าแรก', 'คอร์สเรียน', 'เรียนตัวต่อตัว', 'แหล่งเรียนรู้', 'ติดต่อ'],
                heroSubtitle: 'เชี่ยวชาญรูบิกส์คิวบ์ ด้วยคอร์สเรียนที่เป็นระบบ แหล่งเรียนรู้ทันสมัย และโค้ชส่วนตัว',
                courseCards: [
                  { title: 'พื้นฐาน 3×3', price: '฿690', desc: 'เริ่มต้นแก้รูบิกส์ตั้งแต่ศูนย์' },
                  { title: 'ระดับกลาง CFOP', price: '฿1,390', desc: 'พัฒนาเทคนิคและความเร็ว' },
                  { title: 'ขั้นสูง Speedcubing', price: '฿2,790', desc: 'เทคนิคแข่งขันและการพัฒนาความเร็วการหมุน' }
                ],
                coachingTitle: 'โค้ชแบบตัวต่อตัว',
                coachingText: 'จองเวลาสอนส่วนตัวตามเป้าหมายของคุณ',
                resourcesTitle: 'แหล่งเรียนรู้ฟรี',
                resourcesText: 'สูตรการหมุน แผนฝึก และเทคนิค',
                contactTitle: 'จองคลาสโค้ช'
          }
        };
        
        const translations = {
            en: {
                title: "Elite Speedcubing Coaching",
                subtitle: "Master advanced methods like EO to ZB, X-cross, and Domino Reduction.",
                pricingTitle: "Coaching Options",
                bookTitle: "Reserve Your Session",
                formName: "Full Name",
                formEmail: "Email Address",
                formService: "Select Service",
                formButton: "Confirm Booking",
                sending: "Sending...",
                success: "Success! Check your email soon.",
                services: [
                    { name: "Solve Critique (Video Analysis)", price: "฿200", desc: ["Detailed breakdown of 5 recorded solves.",
                                                                                     "Written Critique"]},
                    { name: "Live 1-on-1 Session (1 Hour)", price: "฿400", desc: "Interactive coaching via video call." },
                    { name: "Mastery Pack (4 Sessions)", price: "฿1,440", desc: "Comprehensive progression with custom drills." }
                ]
            },
            th: {
                title: "สอนรูบิกส์ระดับมืออาชีพ",
                subtitle: "ฝึกฝนเทคนิคขั้นสูง เช่น EO to ZB, X-cross และ Domino Reduction",
                pricingTitle: "แพ็กเกจการสอน",
                bookTitle: "จองเวลาเรียนของคุณ",
                formName: "ชื่อ-นามสกุล",
                formEmail: "อีเมล",
                formService: "เลือกบริการ",
                formButton: "ยืนยันการจอง",
                sending: "กำลังส่ง...",
                success: "สำเร็จ! โปรดรอการติดต่อกลับทางอีเมล",
                services: [
                    { name: "ตรวจการแก้ (Video Analysis)", price: "฿160", desc: "วิเคราะห์การแก้ 5 รอบอย่างละเอียด" },
                    { name: "สอนสดตัวต่อตัว (1 ชั่วโมง)", price: "฿400", desc: "เรียนสดผ่านวิดีโอคอลแบบโต้ตอบ" },
                    { name: "แพ็กเกจเชี่ยวชาญ (4 ครั้ง)", price: "฿1,440", desc: "พัฒนาอย่างต่อเนื่องพร้อมตารางฝึกส่วนตัว" }
                ]
            }
        };

        // ... (Keep your 'cnt' and 'translations' objects exactly as they are) ...

            let currentLang = 'en';
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwqbpCMgiHXTgaCYfqt2z3WWfIdE6AEpUcf5pvsYHh5ZMF7a5lzWJYP8W0NFjsT4B0/exec';

            function toggleLang() {
                currentLang = currentLang === 'en' ? 'th' : 'en';
                render();
                // Re-run visibility logic after re-rendering options to ensure required states stay in sync
                const serviceSelect = document.getElementById('service-select');
                serviceSelect.dispatchEvent(new Event('change'));
            }

            async function handleSubmit(event) {
                event.preventDefault();
                const btn = document.getElementById('submit-btn');
                const content = translations[currentLang];
                
                const serviceValue = document.getElementById('service-select').value.toLowerCase();
                const selectedDays = Array.from(document.querySelectorAll('#available-date input:checked')).map(el => el.value);
                
                // VALIDATION: If it's not a critique, ensure at least one day is picked
                if (!serviceValue.includes('solve critique') && selectedDays.length === 0) {
                    alert(currentLang === 'en' ? 'Please select at least one available day.' : 'กรุณาเลือกวันที่คุณสะดวกอย่างน้อย 1 วัน');
                    return; // Stop the form from sending
                }
                
                const data = {
                    name: document.getElementById('input-name').value,
                    email: document.getElementById('input-email').value,
                    service: document.getElementById('service-select').value,
                    availableDate: selectedDays,
                    preferredTime: document.getElementById('preferred-time').value,
                    secondaryTime: document.getElementById('secondary-time').value,
                    videoLink: document.getElementById('video-link').value,
                    wcaEvent: document.getElementById('wca-event').value
                };

                // Clean data before sending based on service type
                if (serviceValue.includes('solve critique')) {
                    data.availableDate = "";
                    data.preferredTime = "";
                    data.secondaryTime = "";
                    data.wcaEvent = "";
                } else {
                    data.videoLink = "";
                }

                btn.disabled = true;
                btn.innerText = content.sending;

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    alert(content.success);
                    event.target.reset();
                    // Reset visibility after form reset
                    document.getElementById('service-select').dispatchEvent(new Event('change'));
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error connecting to server.');
                } finally {
                    btn.disabled = false;
                    btn.innerText = content.formButton;
                }
            }

            function render() {
                const c = cnt[currentLang];
                document.querySelectorAll('[data-nav]').forEach((el, i) => el.textContent = c.nav[i]);
                
                const content = translations[currentLang];
                document.getElementById('main-title').innerText = content.title;
                document.getElementById('main-subtitle').innerText = content.subtitle;
                document.getElementById('pricing-title').innerText = content.pricingTitle;
                document.getElementById('booking-title').innerText = content.bookTitle;
                document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'TH' : 'EN';
                
                const grid = document.getElementById('pricing-grid');
                grid.innerHTML = '';
                content.services.forEach(s => {
                  const features = s.desc.split('. ').filter(item => item);

                  grid.innerHTML += `
                    <div class="bg-neutral-900 border border-neutral-800 p-8 rounded-2xl hover:border-blue-500 transition duration-300">
                      <h3 class="text-xl font-bold text-white mb-4">${s.name}</h3>
                      <ul class="text-neutral-400 text-sm mb-6 space-y-2">
                        ${features.map(f => `
                          <li class="flex items-start gap-2">
                            <span class="text-blue-500 font-bold">✔</span>
                            <span>${f}</span>
                          </li>
                        `).join('')}
                      </ul>

                      <div class="text-3xl font-bold text-blue-500">${s.price}</div>
                    </div>
                  `;
                });

                const select = document.getElementById('service-select');
                const currentValue = select.value; // Save selection before re-rendering
                select.innerHTML = `<option value="" disabled selected>${content.formService}</option>`;
                content.services.forEach(s => {
                    select.innerHTML += `<option value="${s.name}">${s.name} - ${s.price}</option>`;
                });
                if(currentValue) select.value = currentValue;

                document.getElementById('input-name').placeholder = content.formName;
                document.getElementById('input-email').placeholder = content.formEmail;
                document.getElementById('submit-btn').innerText = content.formButton;
            }

            function generateTimeOptions(selectId) {
                const select = document.getElementById(selectId);
                select.innerHTML = '<option value="">Select time</option>';
                // Loop until 23:30
                for (let h = 0; h <= 23; h++) {
                    for (let m of [0, 30]) {
                        let hour = String(h).padStart(2, '0');
                        let min = String(m).padStart(2, '0');
                        let value = `${hour}:${min}`;
                        let option = document.createElement('option');
                        option.value = value;
                        option.textContent = value;
                        select.appendChild(option);
                    }
                }
            }

            function setupServiceLogic() {
                const serviceSelect = document.getElementById('service-select');
                
                // Select all groups
                const groups = {
                    video: document.getElementById('video-group'),
                    availability: document.getElementById('availability-group'),
                    time: document.getElementById('time-group'),
                    wca: document.getElementById('wca-group')
                };

                function updateVisibility() {
                    const selected = serviceSelect.value.toLowerCase();

                    // Step 1: Hide EVERYTHING and strip ALL required attributes
                    Object.values(groups).forEach(group => {
                        group.classList.add('hidden');
                        // This finds every input, select, and textarea inside the group
                        const inputs = group.querySelectorAll('input, select, textarea');
                        inputs.forEach(input => {
                            input.required = false;
                            // Optional: Clear values of hidden inputs so they don't send old data
                            // if (input.type !== 'checkbox') input.value = ''; 
                        });
                    });

                    if (!selected) return;

                    // Step 2: Enable only what we need
                    if (selected.includes('solve critique')) {
                        groups.video.classList.remove('hidden');
                        groups.video.querySelector('input').required = true;
                    } else {
                        // Show normal booking fields
                        groups.availability.classList.remove('hidden');
                        groups.time.classList.remove('hidden');
                        groups.wca.classList.remove('hidden');

                        // 1. Make WCA Event required
                        groups.wca.querySelector('select').required = true;

                        // 2. Make Time Selects required
                        groups.time.querySelectorAll('select').forEach(s => s.required = true);
                            
                        // 3. For Checkboxes: We don't use the 'required' attribute 
                        // because it forces the user to check EVERY box. 
                        // We will validate this in the handleSubmit function instead.
                        }
                }

                serviceSelect.addEventListener('change', updateVisibility);
            }

            document.addEventListener('DOMContentLoaded', () => {
                render();
                generateTimeOptions('preferred-time');
                generateTimeOptions('secondary-time');
                setupServiceLogic();
                
                // Prevent same time selection
                const primary = document.getElementById('preferred-time');
                const secondary = document.getElementById('secondary-time');
                [primary, secondary].forEach(el => {
                    el.addEventListener('change', () => {
                        if (primary.value && secondary.value && primary.value === secondary.value) {
                            alert('Primary and secondary time cannot be the same');
                            el.value = '';
                        }
                    });
                });
            });
    </script>
</head>
<body class="bg-black text-white">

    <!-- Navbar -->
  <header class="sticky top-0 z-50 bg-neutral-900/80 backdrop-blur-md border-b border-neutral-800/50">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">

      <nav class="hidden md:flex gap-8 text-sm font-medium">

      <button
        id="lang-btn"
        type="button"
        onclick="toggleLang()"
        class="flex items-center gap-2 rounded-full border border-neutral-700 bg-neutral-900 px-4 py-1.5 text-xs font-bold uppercase tracking-widest hover:border-indigo-500 hover:text-indigo-400 transition-all"
      >
        <span id="langBtnText">TH</span>
      </button>
    </div>
  </header>
    
    <!-- Comment out
    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-neutral-900 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold tracking-tighter uppercase">NTP Cuber<span class="text-blue-500">Academy</span></div>

    <section class="relative pt-32 pb-24 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <div class="max-w-4xl mx-auto">
            <h1 id="main-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8"></h1>
            <p id="main-subtitle" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed"></p>
        </div>
    </section>

    <section id="pricing" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 id="pricing-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="book" class="py-24 px-6 bg-neutral-950 border-t border-neutral-900">
        <div class="max-w-3xl mx-auto">
            <h2 id="booking-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <form onsubmit="handleSubmit(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="input-name" name="name" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition" />
                    <input type="email" id="input-email" name="email" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition" />
                </div>
                <select id="service-select" name="service" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition">
                </select>
                
                <!-- Video Link (only for Solve Critique) -->
                <div id="video-group" class="hidden">
                  <label class="block mb-2">🔗 Video Link</label>
                  <input 
                    required
                    type="url" 
                    id="video-link"
                    placeholder="Paste your solve video link here"
                    class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition"
                  />
                </div>

                <!-- WCA Event -->
                <div id="wca-group" class="hidden">
                  <label class="block mb-2">🏆 WCA Event</label>
                  <select id="wca-event" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl">
                    <option value="">Select event</option>
                    <option>3x3</option>
                    <option>2x2</option>
                    <option>4x4</option>
                    <option>5x5</option>
                    <option>6x6</option>
                    <option>7x7</option>
                    <option>OH (One-Handed)</option>
                    <option>Blindfolded</option>
                    <option>Skewb</option>
                    <option>Pyraminx</option>
                    <option>Square-1</option>
                    <option>Clock</option>
                    <option>Megaminx</option>
                  </select>
                </div>

                <!-- Available Date -->
                <div id="availability-group" class="hidden">
                  <label class="block mb-3">&#128198 Available Day</label>
                  <div id="available-date" class="flex flex-wrap gap-3">
    
                    <label class="cursor-pointer">
                      <input type="checkbox" value="Monday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Mon</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Tuesday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Tue</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Wednesday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Wed</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Thursday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Thu</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Friday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Fri</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Saturday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Sat</span>
                    </label>

                    <label class="cursor-pointer">
                      <input type="checkbox" value="Sunday" class="hidden peer">
                      <span class="px-4 py-2 rounded-full bg-neutral-800 peer-checked:bg-blue-600">Sun</span>
                    </label>

                  </div>
                </div>

                <div id="time-group" class="hidden space-y-6">
                <!-- Primary -->
                  <div>
                    <label class="block mb-2">⏰ Most Preferred Starting Time</label>
                    <select id="preferred-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                  </div>

                  <!-- Secondary -->
                  <div>
                    <label class="block mb-2">🕰️ Secondary Preferred Starting Time</label>
                    <select id="secondary-time" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl"></select>
                  </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-neutral-700 text-white font-bold py-4 rounded-xl transition"></button>
            </form>
        </div>
    </section>

    <script>
        function toggleInput(show) {
            const vidInput = document.getElementById('video-link');
            const vidWrapper = document.getElementById('video-group');

            if (show) {
                vidWrapper.style.display = 'block';
                vidInput.required = true;
            } 
            else {
                vidWrapper.style.display = 'none';
                vidInput.required = false; // This prevents the validation error
            }
        }
    </script>

    <my-footer></my-footer>
</body>
