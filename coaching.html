<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTP Cuber | Professional Rubik's Cube Coaching</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Sarabun', 'sans-serif'],
                    },
                },
            },
        }

        const translations = {
            en: {
                title: "Elite Speedcubing Coaching",
                subtitle: "Master advanced methods like EO to ZB, X-cross, and Domino Reduction with personalized training.",
                pricingTitle: "Coaching Options",
                bookTitle: "Reserve Your Session",
                formName: "Full Name",
                formEmail: "Email Address",
                formService: "Select Service",
                formButton: "Confirm Booking",
                services: [
                    { name: "Solve Critique (Video Analysis)", price: "฿160", desc: "Detailed breakdown of 5 recorded solves." },
                    { name: "Live 1-on-1 Session (1 Hour)", price: "฿400", desc: "Interactive coaching via video call." },
                    { name: "Mastery Pack (4 Sessions)", price: "฿1,440", desc: "Comprehensive progression with custom drills." }
                ]
            },
            th: {
                title: "สอนรูบิกส์ระดับมืออาชีพ",
                subtitle: "ฝึกฝนเทคนิคขั้นสูง เช่น EO to ZB, X-cross และ Domino Reduction ด้วยการสอนส่วนตัว",
                pricingTitle: "แพ็กเกจการสอน",
                bookTitle: "จองเวลาเรียนของคุณ",
                formName: "ชื่อ-นามสกุล",
                formEmail: "อีเมล",
                formService: "เลือกบริการ",
                formButton: "ยืนยันการจอง",
                services: [
                    { name: "ตรวจการแก้ (Video Analysis)", price: "฿160", desc: "วิเคราะห์การแก้ 5 รอบอย่างละเอียด" },
                    { name: "สอนสดตัวต่อตัว (1 ชั่วโมง)", price: "฿400", desc: "เรียนสดผ่านวิดีโอคอลแบบโต้ตอบ" },
                    { name: "แพ็กเกจเชี่ยวชาญ (4 ครั้ง)", price: "฿1,440", desc: "พัฒนาอย่างต่อเนื่องพร้อมตารางฝึกส่วนตัว" }
                ]
            }
        };

        let currentLang = 'en';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'th' : 'en';
            render();
        }

        function render() {
            const content = translations[currentLang];
            document.getElementById('main-title').innerText = content.title;
            document.getElementById('main-subtitle').innerText = content.subtitle;
            document.getElementById('pricing-title').innerText = content.pricingTitle;
            document.getElementById('booking-title').innerText = content.bookTitle;
            document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'TH' : 'EN';
            
            const grid = document.getElementById('pricing-grid');
            grid.innerHTML = '';
            content.services.forEach(s => {
                grid.innerHTML += `
                    <div class="bg-neutral-900 border border-neutral-800 p-8 rounded-2xl hover:border-blue-500 transition duration-300">
                        <h3 class="text-xl font-bold text-white mb-2">${s.name}</h3>
                        <p class="text-neutral-400 text-sm mb-6">${s.desc}</p>
                        <div class="text-3xl font-bold text-blue-500">${s.price}</div>
                    </div>
                `;
            });

            const select = document.getElementById('service-select');
            select.innerHTML = `<option value="" disabled selected>${content.formService}</option>`;
            content.services.forEach(s => {
                select.innerHTML += `<option value="${s.name}">${s.name} - ${s.price}</option>`;
            });

            document.getElementById('input-name').placeholder = content.formName;
            document.getElementById('input-email').placeholder = content.formEmail;
            document.getElementById('submit-btn').innerText = content.formButton;
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</head>
<body class="bg-black text-white">

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-neutral-900 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold tracking-tighter uppercase">NTP<span class="text-blue-500">Cuber</span></div>
            <button onclick="toggleLang()" id="lang-btn" class="bg-neutral-800 hover:bg-neutral-700 px-4 py-1 rounded-full text-xs font-bold transition">TH</button>
        </div>
    </nav>

    <section class="relative pt-32 pb-24 px-6 text-center">
        <div class="absolute inset-x-0 top-0 h-96 bg-blue-600/10 blur-[120px] rounded-full -z-10"></div>
        <div class="max-w-4xl mx-auto">
            <h1 id="main-title" class="text-5xl md:text-7xl font-bold tracking-tight mb-8"></h1>
            <p id="main-subtitle" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed"></p>
        </div>
    </section>

    <section id="pricing" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 id="pricing-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <section id="book" class="py-24 px-6 bg-neutral-950 border-t border-neutral-900">
        <div class="max-w-3xl mx-auto">
            <h2 id="booking-title" class="text-3xl font-bold mb-12 text-center"></h2>
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="input-name" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition" />
                    <input type="email" id="input-email" required class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition" />
                </div>
                <select id="service-select" required class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition">
                </select>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition"></button>
            </form>
        </div>
    </section>

</body>
</html>
