
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubik's Cube Course & Coaching</title>
  <script
  src="https://cdn.tailwindcss.com"
  ></script>
  
  
<script>
    const content = {
      en: {
        nav: ['Home', 'Courses', 'Coaching', 'Resources', 'Contact'],
        heroTitle: "Master the Rubik's Cube",
        heroSubtitle: 'Structured courses, modern resources, and personal coaching.',
        courseCards: [
          { title: 'Beginner 3×3', price: '$19', desc: 'Learn to solve from zero with clear steps.' },
          { title: 'Intermediate CFOP', price: '$39', desc: 'Improve efficiency and average times.' },
          { title: 'Advanced Speedcubing', price: '$79', desc: 'Full CFOP, lookahead, and TPS training.' }
        ],
        coachingTitle: '1-on-1 Coaching',
        coachingText: 'Book a private session tailored to your goals.',
        resourcesTitle: 'Free Resources',
        resourcesText: 'Algorithms, practice plans, and solving tips.',
        contactTitle: 'Book a Coaching Session'
      },
      th: {
        nav: ['หน้าแรก', 'คอร์สเรียน', 'โค้ชชิ่ง', 'แหล่งเรียนรู้', 'ติดต่อ'],
        heroTitle: 'เชี่ยวชาญรูบิกส์คิวบ์',
        heroSubtitle: 'คอร์สเรียนที่เป็นระบบ แหล่งเรียนรู้ทันสมัย และโค้ชส่วนตัว',
        courseCards: [
          { title: 'พื้นฐาน 3×3', price: '฿690', desc: 'เริ่มต้นแก้รูบิกส์ตั้งแต่ศูนย์' },
          { title: 'ระดับกลาง CFOP', price: '฿1,390', desc: 'พัฒนาเทคนิคและความเร็ว' },
          { title: 'ขั้นสูง Speedcubing', price: '฿2,790', desc: 'เทคนิคแข่งขันและ TPS' }
        ],
        coachingTitle: 'โค้ชแบบตัวต่อตัว',
        coachingText: 'จองเวลาสอนส่วนตัวตามเป้าหมายของคุณ',
        resourcesTitle: 'แหล่งเรียนรู้ฟรี',
        resourcesText: 'สูตรการหมุน แผนฝึก และเทคนิค',
        contactTitle: 'จองคลาสโค้ช'
      }
    };

    let currentLang = 'en';

    function switchLang() {
      currentLang = currentLang === 'en' ? 'th' : 'en';
      applyLang();
    }

    function applyLang() {
      const c = content[currentLang];
      document.querySelectorAll('[data-nav]').forEach((el, i) => el.textContent = c.nav[i]);
      document.getElementById('heroTitle').textContent = c.heroTitle;
      document.getElementById('heroSubtitle').textContent = c.heroSubtitle;
      document.getElementById('coachingTitle').textContent = c.coachingTitle;
      document.getElementById('coachingText').textContent = c.coachingText;
      document.getElementById('resourcesTitle').textContent = c.resourcesTitle;
      document.getElementById('resourcesText').textContent = c.resourcesText;
      document.getElementById('contactTitle').textContent = c.contactTitle;
      document.getElementById('langBtn').textContent = currentLang === 'en' ? 'TH' : 'EN';

      const cards = document.getElementById('courseCards');
      cards.innerHTML = '';
      c.courseCards.forEach(card => {
        cards.innerHTML += `
          <div class="bg-neutral-900 rounded-xl p-6 border border-neutral-800 hover:border-indigo-500 transition">
            <h3 class="text-xl font-semibold mb-2">${card.title}</h3>
            <p class="text-neutral-400 mb-4">${card.desc}</p>
            <div class="text-2xl font-bold text-indigo-400">${card.price}</div>
          </div>`;
      });
    }


    document.addEventListener('DOMContentLoaded', applyLang);
  </script>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans">

  <!-- Gradient Background Accent -->
  <div class="absolute inset-x-0 top-[-10rem] h-[30rem] bg-gradient-to-br from-indigo-600/30 via-purple-600/20 to-cyan-500/20 blur-3xl -z-10"></div>
  <!-- Navbar -->
  <header class="sticky top-0 z-50 bg-neutral-900/80 backdrop-blur">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
      <div class="font-semibold text-lg">Cubing Academy</div>
      <nav class="hidden md:flex gap-8 text-sm">
        <a href="#" data-nav class="hover:text-indigo-400"></a>
        <a href="#courses" data-nav class="hover:text-indigo-400"></a>
        <a href="#coaching" data-nav class="hover:text-indigo-400"></a>
        <a href="#resources" data-nav class="hover:text-indigo-400"></a>
        <a href="#contact" data-nav class="hover:text-indigo-400"></a>
      </nav>
      
  <button
    id="langBtn"
    type="button"
    aria-label="Switch language"
    onclick="switchLang()"
    class="flex items-center gap-2 rounded-full border border-neutral-700 bg-neutral-900 px-4 py-1.5 text-sm font-medium hover:border-indigo-500 hover:text-indigo-400 transition"
  >
    <span id="langText">EN</span>
  </button>

    </div>
  </header>

  <!-- Hero -->
  <section class="min-h-screen flex items-center">
    <div class="max-w-6xl mx-auto px-6">
      <h1 id="heroTitle" class="text-5xl md:text-7xl font-bold mb-6"></h1>
      <p id="heroSubtitle" class="text-neutral-400 max-w-2xl text-lg"></p>
    </div>
  </section>

  <!-- Courses -->
  <section id="courses" class="py-24">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-3xl font-semibold mb-10">Courses & Pricing</h2>
      <div id="courseCards" class="grid md:grid-cols-3 gap-6"></div>
    </div>
  </section>

  <!-- Coaching -->
  <section id="coaching" class="py-24 bg-neutral-900">
    <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12">
      <div>
        <h2 id="coachingTitle" class="text-3xl font-semibold mb-4"></h2>
        <p id="coachingText" class="text-neutral-400"></p>
      </div>


      <!-- Booking Form -->
      <form class="space-y-4">
        <input type="text" placeholder="Name" class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3" />
        <input type="email" placeholder="Email" class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3" />
        <select class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3">
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 transition rounded py-3 font-semibold">Book Session</button>
      </form>
    </div>
  </section>


  <!-- Resources -->
  <section id="resources" class="py-24">
    <div class="max-w-6xl mx-auto px-6">
      <h2 id="resourcesTitle" class="text-3xl font-semibold mb-4"></h2>
      <p id="resourcesText" class="text-neutral-400 max-w-2xl"></p>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="py-24 bg-neutral-900">
    <div class="max-w-6xl mx-auto px-6">
      <h2 id="contactTitle" class="text-3xl font-semibold mb-4"></h2>
      <p class="text-neutral-400">We will contact you within 24 hours.</p>
    </div>
  </section>

  <footer class="py-8 text-center text-neutral-600 text-sm border-t border-neutral-800">
    © 2026 Cubing Academy
  </footer>

</body>
</html>
